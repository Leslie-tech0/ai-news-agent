<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    @page {
      size: A4;
      margin: 14mm 12mm 16mm;
    }

    :root {
      color-scheme: light;
      --paper: #fffdf8;
      --ink: #1f2937;
      --muted: #5b6472;
      --line: #d8deea;
      --accent: #155e75;
      --accent-soft: #d8eef2;
      --quote: #f3f5f8;
      --code: #f5efe1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.7;
      font-size: 13px;
    }

    main {
      width: 100%;
    }

    .report-header {
      margin-bottom: 18px;
      padding: 0 0 12px;
      border-bottom: 2px solid var(--line);
    }

    .report-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      color: #102a43;
      letter-spacing: 0.01em;
    }

    .content {
      width: 100%;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      color: #12263f;
      break-after: avoid;
      break-inside: avoid;
      line-height: 1.3;
      margin-top: 1.25em;
      margin-bottom: 0.45em;
    }

    h1 {
      font-size: 24px;
      margin-top: 0;
    }

    h2 {
      font-size: 18px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }

    h3 {
      font-size: 15px;
      color: var(--accent);
    }

    p,
    ul,
    ol,
    blockquote,
    pre,
    table {
      margin-top: 0;
      margin-bottom: 0.9em;
    }

    ul,
    ol {
      padding-left: 1.4em;
    }

    li {
      margin-bottom: 0.35em;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-word;
    }

    strong {
      color: #102a43;
    }

    code {
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      font-size: 0.92em;
      background: var(--code);
      padding: 0.08em 0.35em;
      border-radius: 4px;
    }

    pre {
      padding: 12px 14px;
      background: #12263f;
      color: #eef4ff;
      border-radius: 8px;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-word;
    }

    pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    blockquote {
      margin-left: 0;
      padding: 10px 14px;
      background: var(--quote);
      border-left: 4px solid var(--accent);
      color: #334155;
      border-radius: 6px;
    }

    hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 18px 0;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 10px auto 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      break-inside: avoid;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: var(--accent-soft);
      color: #0f172a;
    }

    .empty-note {
      padding: 12px 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fafafb;
    }
  </style>
</head>
<body>
  <main>
    <header class="report-header">
      <h1 class="report-title">{{title}}</h1>
    </header>
    <section class="content">
      {{content}}
    </section>
  </main>
</body>
</html>
